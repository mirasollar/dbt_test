version: 2

sources:
  - name: raw
    description: Tables from Keboola Storage bucket
    database: "{{ target.database }}"
    schema: out.c-mso_dev_dbt_test
    quoting:
      database: true
      schema: true
      identifier: true
    tables:
      - name: fake_client
        description: Raw client data from fake extractor
        freshness: null
      - name: fake_revenue
        description: Raw revenue transactions from fake extractor
        freshness:
          warn_after:
            count: 1
            period: day
          error_after:
            count: 2
            period: day
        loaded_at_field: '"date"::TIMESTAMP'
